<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Signal Scanner Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;padding:1.25rem}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.wrap{max-width:1200px;margin:0 auto}

/* TOP BAR */
.topbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #1a1a1a}
.ttl{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.sub{font-size:11px;color:#555;margin-top:3px}
.topright{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* MARKET BAR */
.mbar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:1rem;padding:10px 14px;background:#111;border-radius:10px;border:1px solid #1e1e1e;align-items:center}
.mitem{display:flex;flex-direction:column;gap:1px}
.mlbl{font-size:10px;color:#555}
.mval{font-size:13px;font-weight:600;color:#ccc}
.mval.up{color:#7bc142}.mval.down{color:#e24b4a}
.mbar-loading{font-size:12px;color:#444}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
input[type=text]{padding:7px 10px;font-size:13px;border:1px solid #222;border-radius:8px;background:#111;color:#e0e0e0;text-transform:uppercase;outline:none;width:100px}
input[type=text]:focus{border-color:#444}
select{padding:7px 10px;font-size:13px;border:1px solid #222;border-radius:8px;background:#111;color:#e0e0e0;outline:none;cursor:pointer}
button{padding:7px 13px;font-size:13px;border:1px solid #222;border-radius:8px;background:#111;color:#ccc;cursor:pointer;transition:all 0.15s;white-space:nowrap}
button:hover{background:#1e1e1e;color:#fff}
button.active{background:#1e3a0f;border-color:#4a7c2f;color:#7bc142}
.sep{width:1px;height:24px;background:#222}
.refresh-info{font-size:11px;color:#444;display:flex;align-items:center;gap:5px}
.rdot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0}
.rdot.active{background:#7bc142;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* FILTER TABS */
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.ftab{padding:5px 12px;font-size:12px;border:1px solid #222;border-radius:20px;background:#111;color:#666;cursor:pointer;transition:all 0.15s}
.ftab:hover{color:#ccc;border-color:#333}
.ftab.active{background:#1a1a1a;border-color:#444;color:#fff}
.ftab.tab-buy.active{background:#1e3a0f;border-color:#4a7c2f;color:#7bc142}
.ftab.tab-sell.active{background:#3a0f0f;border-color:#7c2f2f;color:#e24b4a}
.ftab.tab-neutral.active{background:#2a2200;border-color:#5a4400;color:#ef9f27}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:1rem 1.1rem;position:relative;transition:border-color 0.3s,transform 0.1s}
.card:hover{transform:translateY(-1px)}
.card.c-buy{border-color:#2d5a18}
.card.c-sell{border-color:#5a1818}

/* CARD HEADER */
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cleft{flex:1}
.cn{font-size:14px;font-weight:700;color:#fff}
.cprow{display:flex;align-items:center;gap:8px;margin-top:3px}
.cp{font-size:13px;color:#aaa;font-weight:500}
.pchg{font-size:11px;padding:1px 5px;border-radius:4px;font-weight:600}
.pchg.up{background:#1a3a0a;color:#7bc142}
.pchg.down{background:#3a0f0f;color:#e24b4a}
.score-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.badge{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.bg{background:#1e3a0f;color:#7bc142}
.bs{background:#3a0f0f;color:#e24b4a}
.bn{background:#2a2200;color:#ef9f27}
.score-max{font-size:10px;color:#444}

/* MINI CHART */
.minichart{margin:8px 0;height:40px;position:relative}
.minichart canvas{width:100%!important;height:40px!important}

/* TIMEFRAME COMPARISON */
.tfrow{display:flex;gap:4px;margin-bottom:8px}
.tfbadge{flex:1;text-align:center;padding:3px 4px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid transparent}
.tfbadge.tb{background:#1a3a0a;color:#7bc142;border-color:#2d5a18}
.tfbadge.tr{background:#3a0f0f;color:#e24b4a;border-color:#5a1818}
.tfbadge.tn{background:#1e1a00;color:#ef9f27;border-color:#3a3000}

/* INDICATORS */
.inds{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.ind{background:#0d0d0d;border-radius:7px;padding:6px 8px}
.il{font-size:10px;color:#444;margin-bottom:2px}
.iv{font-size:11px;font-weight:600;color:#bbb}
.is{font-size:10px;margin-top:1px}
.ib{color:#7bc142}.ir{color:#e24b4a}.in_{color:#ef9f27}

/* SIGNAL BAR */
.bar{display:flex;align-items:center;gap:6px;padding-top:8px;border-top:1px solid #1a1a1a}
.barlbl{font-size:11px;color:#555;flex-shrink:0}
.bartxt{font-size:11px;font-weight:700;white-space:nowrap}
.tb{color:#7bc142}.tr{color:#e24b4a}.tn{color:#ef9f27}
.meter{flex:1;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin:0 4px}
.mfill{height:100%;border-radius:3px;transition:width 0.5s}
.mfill-buy{background:#639922}
.mfill-sell{background:#e24b4a}
.mfill-neutral{background:#ef9f27}

/* ALERT */
.alert-row{display:flex;gap:5px;align-items:center;margin-top:7px;padding-top:7px;border-top:1px solid #1a1a1a}
.alert-inp{flex:1;padding:4px 7px;font-size:11px;border:1px solid #222;border-radius:6px;background:#0d0d0d;color:#ccc;outline:none;width:0}
.alert-inp:focus{border-color:#444}
.alert-inp::placeholder{color:#333}
.alert-btn{padding:4px 8px;font-size:11px;border:1px solid #222;border-radius:6px;background:#0d0d0d;color:#666;cursor:pointer;white-space:nowrap;flex-shrink:0}
.alert-btn:hover{background:#1a1a1a;color:#ccc}
.alert-active{font-size:10px;color:#ef9f27;display:flex;align-items:center;gap:4px;flex:1}
.alert-clr{font-size:10px;color:#444;cursor:pointer;padding:2px 4px;border-radius:4px}
.alert-clr:hover{color:#e24b4a}

/* HISTORY */
.hist-btn{font-size:10px;color:#444;cursor:pointer;padding:2px 0;text-align:right;margin-top:4px}
.hist-btn:hover{color:#888}
.hist-panel{margin-top:6px;padding:6px 8px;background:#0d0d0d;border-radius:7px;max-height:80px;overflow-y:auto}
.hist-item{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid #1a1a1a}
.hist-item:last-child{border-bottom:none}
.hist-time{color:#444}
.hist-score{font-weight:600}

/* REMOVE */
.rbtn{position:absolute;top:7px;right:8px;width:18px;height:18px;border-radius:50%;border:none;background:transparent;color:#333;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;padding:0;opacity:0;transition:opacity 0.2s}
.card:hover .rbtn{opacity:1}
.rbtn:hover{background:#1e1e1e;color:#ccc}

/* LOADING */
.lcard{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;gap:8px}
.lspinner{width:18px;height:18px;border:2px solid #222;border-top-color:#555;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:11px;color:#444}
.etxt{font-size:12px;color:#e24b4a;text-align:center}

/* QUICK CHIPS */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #1e1e1e;background:#111;color:#666;transition:all 0.15s}
.chip:hover{background:#1a1a1a;color:#ccc;border-color:#333}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#1e3a0f;border:1px solid #4a7c2f;color:#7bc142;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.toast.warn{background:#2a1a00;border-color:#6a4400;color:#ef9f27}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:#333;font-size:13px;grid-column:1/-1;border:1px dashed #1a1a1a;border-radius:12px}

/* FOOTER */
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:6px}
.lupd{font-size:11px;color:#333}
.legend{display:flex;gap:12px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#444}
.ldot{width:7px;height:7px;border-radius:50%}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div>
      <div class="ttl">Crypto Signal Scanner Pro</div>
      <div class="sub">RSI · EMA 9/21 · MACD · Bollinger · Volumen — datos reales Binance</div>
    </div>
    <div class="topright">
      <div class="refresh-info">
        <div class="rdot" id="rdot"></div>
        <span id="refresh-lbl">Auto-refresh: off</span>
      </div>
    </div>
  </div>

  <!-- MARKET OVERVIEW -->
  <div class="mbar" id="mbar"><span class="mbar-loading">Cargando mercado...</span></div>

  <!-- CONTROLS -->
  <div class="controls">
    <input type="text" id="ci" placeholder="BTC, DOGE..." maxlength="12"/>
    <button onclick="addCoin()">+ Agregar</button>
    <div class="sep"></div>
    <select id="tf" onchange="refreshAll()">
      <option value="1h">1H</option>
      <option value="4h">4H</option>
      <option value="1d">1D</option>
    </select>
    <div class="sep"></div>
    <button id="ar-btn" onclick="toggleAutoRefresh()">Auto-refresh</button>
    <select id="ar-interval" onchange="updateAutoRefresh()">
      <option value="60">1 min</option>
      <option value="300" selected>5 min</option>
      <option value="900">15 min</option>
      <option value="1800">30 min</option>
    </select>
    <div class="sep"></div>
    <button onclick="refreshAll()">↻ Actualizar</button>
    <button onclick="sortCards()">⇅ Ordenar</button>
  </div>

  <!-- QUICK ADD -->
  <div class="chips">
    <span style="font-size:11px;color:#444;align-self:center;margin-right:4px">Populares:</span>
    <div class="chip" onclick="quickAdd('BTC')">BTC</div>
    <div class="chip" onclick="quickAdd('ETH')">ETH</div>
    <div class="chip" onclick="quickAdd('DOGE')">DOGE</div>
    <div class="chip" onclick="quickAdd('SOL')">SOL</div>
    <div class="chip" onclick="quickAdd('BNB')">BNB</div>
    <div class="chip" onclick="quickAdd('XRP')">XRP</div>
    <div class="chip" onclick="quickAdd('ADA')">ADA</div>
    <div class="chip" onclick="quickAdd('PEPE')">PEPE</div>
    <div class="chip" onclick="quickAdd('AVAX')">AVAX</div>
    <div class="chip" onclick="quickAdd('LINK')">LINK</div>
    <div class="chip" onclick="quickAdd('DEXE')">DEXE</div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="ftab active" data-filter="all" onclick="setFilter('all')">Todas</div>
    <div class="ftab tab-buy" data-filter="buy" onclick="setFilter('buy')">Compra (+2 a +5)</div>
    <div class="ftab tab-sell" data-filter="sell" onclick="setFilter('sell')">Venta (-2 a -5)</div>
    <div class="ftab tab-neutral" data-filter="neutral" onclick="setFilter('neutral')">Neutral</div>
  </div>

  <div class="grid" id="grid">
    <div class="empty" id="empty-msg">Agrega una moneda para comenzar</div>
  </div>

  <div class="foot">
    <div class="lupd" id="lu"></div>
    <div class="legend">
      <div class="leg"><div class="ldot" style="background:#639922"></div>compra</div>
      <div class="leg"><div class="ldot" style="background:#ef9f27"></div>neutral</div>
      <div class="leg"><div class="ldot" style="background:#e24b4a"></div>venta</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let coins=[];
let cdata={};
let alerts={};
let history_={};
let autoTimer=null;
let autoOn=false;
let currentFilter='all';
let sortAsc=false;

/* ---- MATH ---- */
function emaCalc(arr,p){
  const k=2/(p+1);let e=arr[0];
  return arr.map(v=>{e=v*k+e*(1-k);return e});
}
function calcRSI(c,p=14){
  if(c.length<p+1)return null;
  let ag=0,al=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>0)ag+=d;else al-=d;}
  ag/=p;al/=p;
  for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;}
  if(al===0)return 100;
  return 100-(100/(1+ag/al));
}
function calcMACD(c){
  if(c.length<35)return null;
  const m12=emaCalc(c,12),m26=emaCalc(c,26);
  const ml=m12.map((v,i)=>v-m26[i]);
  const sl=emaCalc(ml.slice(-20),9);
  const lm=ml[ml.length-1],ls=sl[sl.length-1];
  const pm=ml[ml.length-2],ps=sl[sl.length-2];
  return{h:lm-ls,ph:pm-ps};
}
function calcEMA(c){
  if(c.length<22)return null;
  const e9=emaCalc(c,9),e21=emaCalc(c,21);
  return{bullish:e9[e9.length-1]>e21[e21.length-1]};
}
function calcBB(c,p=20){
  if(c.length<p)return null;
  const slice=c.slice(-p);
  const mid=slice.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(slice.reduce((a,b)=>a+(b-mid)**2,0)/p);
  const last=c[c.length-1];
  const upper=mid+2*std,lower=mid-2*std;
  const pct=(last-lower)/(upper-lower);
  return{pct,upper,lower,mid,last};
}
function calcVol(vols,closes){
  if(vols.length<20)return null;
  const avg=vols.slice(-20).reduce((a,b)=>a+b,0)/20;
  const lv=vols[vols.length-1];
  const up=closes[closes.length-1]>=closes[closes.length-2];
  return{ratio:lv/avg,up};
}
function analyze(rsi,macd,em,bb,vol){
  let score=0,sigs=[];
  if(rsi!=null){
    if(rsi<35){score++;sigs.push({l:'RSI',v:rsi.toFixed(1),s:'oversold',t:'b'});}
    else if(rsi>65){score--;sigs.push({l:'RSI',v:rsi.toFixed(1),s:'overbought',t:'r'});}
    else sigs.push({l:'RSI',v:rsi.toFixed(1),s:'neutral',t:'n'});
  }
  if(em){
    if(em.bullish){score++;sigs.push({l:'EMA 9/21',v:'9 > 21',s:'alcista',t:'b'});}
    else{score--;sigs.push({l:'EMA 9/21',v:'9 < 21',s:'bajista',t:'r'});}
  }
  if(macd){
    if(macd.h>0&&macd.h>macd.ph){score++;sigs.push({l:'MACD',v:(macd.h>=0?'+':'')+macd.h.toFixed(5),s:'momentum +',t:'b'});}
    else if(macd.h<0&&macd.h<macd.ph){score--;sigs.push({l:'MACD',v:macd.h.toFixed(5),s:'momentum -',t:'r'});}
    else sigs.push({l:'MACD',v:macd.h.toFixed(5),s:'neutral',t:'n'});
  }
  if(bb){
    if(bb.pct<0.2){score++;sigs.push({l:'Bollinger',v:(bb.pct*100).toFixed(0)+'%',s:'banda baja',t:'b'});}
    else if(bb.pct>0.8){score--;sigs.push({l:'Bollinger',v:(bb.pct*100).toFixed(0)+'%',s:'banda alta',t:'r'});}
    else sigs.push({l:'Bollinger',v:(bb.pct*100).toFixed(0)+'%',s:'centro',t:'n'});
  }
  if(vol){
    if(vol.ratio>1.3&&vol.up){score++;sigs.push({l:'Volumen',v:vol.ratio.toFixed(1)+'x',s:'alto+verde',t:'b'});}
    else if(vol.ratio>1.3&&!vol.up){score--;sigs.push({l:'Volumen',v:vol.ratio.toFixed(1)+'x',s:'alto+rojo',t:'r'});}
    else sigs.push({l:'Volumen',v:vol.ratio.toFixed(1)+'x avg',s:'normal',t:'n'});
  }
  return{score,sigs};
}
function sigLabel(s){
  if(s>=4)return{txt:'Compra fuerte',cls:'tb'};
  if(s>=2)return{txt:'Posible compra',cls:'tb'};
  if(s<=-4)return{txt:'Venta fuerte',cls:'tr'};
  if(s<=-2)return{txt:'Posible venta',cls:'tr'};
  return{txt:'Neutral — espera',cls:'tn'};
}
function cardClass(s){return s>=2?'c-buy':s<=-2?'c-sell':'';}
function badgeClass(s){return s>=2?'bg':s<=-2?'bs':'bn';}
function meterPct(s){return Math.round(((s+5)/10)*100);}
function meterCls(s){return s>=2?'mfill-buy':s<=-2?'mfill-sell':'mfill-neutral';}
function indCls(t){return t==='b'?'ib':t==='r'?'ir':'in_';}
function fmtPrice(p){return p<0.0001?p.toFixed(7):p<0.01?p.toFixed(6):p<1?p.toFixed(4):p<1000?p.toFixed(2):p.toLocaleString('en-US',{maximumFractionDigits:0});}

/* ---- MINI CHART ---- */
function drawChart(canvasId,prices){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const w=canvas.offsetWidth||260;const h=40;
  canvas.width=w;canvas.height=h;
  ctx.clearRect(0,0,w,h);
  if(!prices||prices.length<2)return;
  const mn=Math.min(...prices),mx=Math.max(...prices);
  const rng=mx-mn||1;
  const pts=prices.map((p,i)=>({x:(i/(prices.length-1))*w,y:h-((p-mn)/rng)*(h-4)-2}));
  const up=prices[prices.length-1]>=prices[0];
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=up?'#639922':'#e24b4a';
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  ctx.fillStyle=up?'rgba(99,153,34,0.08)':'rgba(226,75,74,0.08)';
  ctx.fill();
}

/* ---- FETCH ---- */
async function fetchTF(coin,tf){
  const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin}USDT&interval=${tf}&limit=100`);
  if(!r.ok)throw new Error();
  const rows=await r.json();
  const closes=rows.map(k=>parseFloat(k[4]));
  const vols=rows.map(k=>parseFloat(k[5]));
  return{closes,vols,rows};
}

async function loadCoin(coin){
  renderCard(coin,true,false);
  try{
    const tf=document.getElementById('tf').value;
    const{closes,vols,rows}=await fetchTF(coin,tf);

    const rsi=calcRSI(closes);
    const macd=calcMACD(closes);
    const em=calcEMA(closes);
    const bb=calcBB(closes);
    const vol=calcVol(vols,closes);
    const{score,sigs}=analyze(rsi,macd,em,bb,vol);

    const open0=parseFloat(rows[0][1]);
    const lastClose=closes[closes.length-1];
    const chg24=((lastClose-open0)/open0)*100;

    const sparkPrices=closes.slice(-30);

    const[r1h,r4h,r1d]=await Promise.all([
      fetchTF(coin,'1h').then(d=>analyze(calcRSI(d.closes),calcMACD(d.closes),calcEMA(d.closes),calcBB(d.closes),calcVol(d.vols,d.closes)).score).catch(()=>null),
      fetchTF(coin,'4h').then(d=>analyze(calcRSI(d.closes),calcMACD(d.closes),calcEMA(d.closes),calcBB(d.closes),calcVol(d.vols,d.closes)).score).catch(()=>null),
      fetchTF(coin,'1d').then(d=>analyze(calcRSI(d.closes),calcMACD(d.closes),calcEMA(d.closes),calcBB(d.closes),calcVol(d.vols,d.closes)).score).catch(()=>null),
    ]);

    cdata[coin]={symbol:coin,price:lastClose,chg24,score,sigs,sparkPrices,tf1h:r1h,tf4h:r4h,tf1d:r1d};

    if(!history_[coin])history_[coin]=[];
    history_[coin].unshift({time:new Date().toLocaleTimeString('es-PY'),score});
    if(history_[coin].length>10)history_[coin].pop();

    checkAlert(coin,lastClose);
    renderCard(coin,false,false);
    applyFilter();
  }catch(e){renderCard(coin,false,true);}
}

/* ---- ALERT ---- */
function checkAlert(coin,price){
  if(!alerts[coin])return;
  const{target,dir}=alerts[coin];
  if(dir==='below'&&price<=target){showToast(`ALERTA: ${coin} llegó a $${fmtPrice(price)}!`,'warn');delete alerts[coin];}
  else if(dir==='above'&&price>=target){showToast(`ALERTA: ${coin} llegó a $${fmtPrice(price)}!`,'warn');delete alerts[coin];}
}
function setAlert(coin){
  const inp=document.getElementById('ai-'+coin);
  const val=parseFloat(inp.value);
  if(!val||isNaN(val))return;
  const current=cdata[coin]?cdata[coin].price:0;
  alerts[coin]={target:val,dir:val<current?'below':'above'};
  inp.value='';
  renderCard(coin,false,false);
  showToast(`Alerta seteada para ${coin} en $${fmtPrice(val)}`);
}
function clearAlert(coin){delete alerts[coin];renderCard(coin,false,false);}

/* ---- RENDER ---- */
function renderCard(coin,loading,err){
  let card=document.getElementById('c-'+coin);
  const isNew=!card;
  if(isNew){card=document.createElement('div');card.id='c-'+coin;}
  card.className='card'+(loading||err?'':' '+cardClass(cdata[coin]&&cdata[coin].score));

  if(loading){
    card.innerHTML=`<button class="rbtn" onclick="removeCoin('${coin}')">×</button><div class="lcard"><div class="lspinner"></div><div class="ltxt">Cargando ${coin}...</div></div>`;
  } else if(err){
    card.innerHTML=`<button class="rbtn" onclick="removeCoin('${coin}')">×</button><div class="lcard"><div class="etxt">${coin} no encontrado en Binance</div><button onclick="removeCoin('${coin}')" style="margin-top:8px;font-size:11px;padding:4px 8px">Quitar</button></div>`;
  } else {
    const d=cdata[coin];
    const px=fmtPrice(d.price);
    const sl=sigLabel(d.score);
    const pct=meterPct(d.score);
    const chgStr=(d.chg24>=0?'+':'')+d.chg24.toFixed(2)+'%';
    const chgCls=d.chg24>=0?'up':'down';
    const inds=d.sigs.map(x=>`<div class="ind"><div class="il">${x.l}</div><div class="iv">${x.v}</div><div class="is ${indCls(x.t)}">${x.s}</div></div>`).join('');

    function tfB(s){if(s===null)return'tn';return s>=2?'tb':s<=-2?'tr':'tn';}
    function tfL(s){if(s===null)return'—';return(s>0?'+':'')+s;}

    const alertHTML=alerts[coin]
      ?`<div class="alert-row"><div class="alert-active">Alerta: $${fmtPrice(alerts[coin].target)}</div><span class="alert-clr" onclick="clearAlert('${coin}')">× quitar</span></div>`
      :`<div class="alert-row"><input class="alert-inp" id="ai-${coin}" placeholder="Alerta precio..." type="number" step="any"/><button class="alert-btn" onclick="setAlert('${coin}')">+ Alerta</button></div>`;

    const hist=history_[coin]||[];
    const histHTML=hist.length>0?`<div class="hist-btn" onclick="toggleHist('${coin}')">historial de señales ▾</div><div id="hist-${coin}" style="display:none"><div class="hist-panel">${hist.map(h=>`<div class="hist-item"><span class="hist-time">${h.time}</span><span class="hist-score ${h.score>=2?'tb':h.score<=-2?'tr':'tn'}">${h.score>0?'+':''}${h.score}</span></div>`).join('')}</div></div>`:'';

    card.innerHTML=`
      <button class="rbtn" onclick="removeCoin('${coin}')">×</button>
      <div class="ch">
        <div class="cleft">
          <div class="cn">${d.symbol}/USDT</div>
          <div class="cprow"><span class="cp">$${px}</span><span class="pchg ${chgCls}">${chgStr}</span></div>
        </div>
        <div class="score-wrap">
          <div class="badge ${badgeClass(d.score)}">${d.score>0?'+':''}${d.score}</div>
          <div class="score-max">de ±5</div>
        </div>
      </div>
      <div class="minichart"><canvas id="spark-${coin}"></canvas></div>
      <div class="tfrow">
        <div class="tfbadge ${tfB(d.tf1h)}">1H: ${tfL(d.tf1h)}</div>
        <div class="tfbadge ${tfB(d.tf4h)}">4H: ${tfL(d.tf4h)}</div>
        <div class="tfbadge ${tfB(d.tf1d)}">1D: ${tfL(d.tf1d)}</div>
      </div>
      <div class="inds">${inds}</div>
      <div class="bar">
        <span class="barlbl">Señal:</span>
        <div class="meter"><div class="mfill ${meterCls(d.score)}" style="width:${pct}%"></div></div>
        <span class="bartxt ${sl.cls}">${sl.txt}</span>
      </div>
      ${alertHTML}
      ${histHTML}`;
  }

  const empty=document.getElementById('empty-msg');
  if(empty)empty.remove();
  if(isNew)document.getElementById('grid').appendChild(card);

  if(!loading&&!err&&cdata[coin]){
    setTimeout(()=>drawChart('spark-'+coin,cdata[coin].sparkPrices),50);
  }
}

/* ---- FILTER / SORT ---- */
function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(t=>{t.classList.toggle('active',t.dataset.filter===f);});
  applyFilter();
}
function applyFilter(){
  coins.forEach(c=>{
    const card=document.getElementById('c-'+c);
    if(!card)return;
    const d=cdata[c];
    if(!d){card.style.display='';return;}
    if(currentFilter==='all')card.style.display='';
    else if(currentFilter==='buy')card.style.display=d.score>=2?'':'none';
    else if(currentFilter==='sell')card.style.display=d.score<=-2?'':'none';
    else if(currentFilter==='neutral')card.style.display=(d.score>-2&&d.score<2)?'':'none';
  });
}
function sortCards(){
  sortAsc=!sortAsc;
  const sorted=[...coins].sort((a,b)=>{
    const sa=cdata[a]?cdata[a].score:-99;
    const sb=cdata[b]?cdata[b].score:-99;
    return sortAsc?sa-sb:sb-sa;
  });
  const grid=document.getElementById('grid');
  sorted.forEach(c=>{const el=document.getElementById('c-'+c);if(el)grid.appendChild(el);});
  showToast('Ordenado por señal '+(sortAsc?'↑ asc':'↓ desc'));
}

function toggleHist(coin){
  const p=document.getElementById('hist-'+coin);
  if(p)p.style.display=p.style.display==='none'?'block':'none';
}

/* ---- AUTO REFRESH ---- */
function toggleAutoRefresh(){
  autoOn=!autoOn;
  const btn=document.getElementById('ar-btn');
  const dot=document.getElementById('rdot');
  if(autoOn){
    btn.classList.add('active');
    dot.classList.add('active');
    const secs=parseInt(document.getElementById('ar-interval').value);
    document.getElementById('refresh-lbl').textContent='Auto: cada '+secs/60+'min';
    autoTimer=setInterval(refreshAll,secs*1000);
    showToast('Auto-refresh activado');
  } else {
    btn.classList.remove('active');
    dot.classList.remove('active');
    clearInterval(autoTimer);
    document.getElementById('refresh-lbl').textContent='Auto-refresh: off';
    showToast('Auto-refresh desactivado');
  }
}
function updateAutoRefresh(){
  if(!autoOn)return;
  clearInterval(autoTimer);
  const secs=parseInt(document.getElementById('ar-interval').value);
  document.getElementById('refresh-lbl').textContent='Auto: cada '+secs/60+'min';
  autoTimer=setInterval(refreshAll,secs*1000);
}

/* ---- MARKET BAR ---- */
async function loadMarket(){
  try{
    const [btc,eth,dom]=await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT').then(r=>r.json()),
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT').then(r=>r.json()),
      fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r=>r.json()),
    ]);
    const btcChg=parseFloat(btc.priceChangePercent);
    const ethChg=parseFloat(eth.priceChangePercent);
    const btcPx=parseFloat(btc.lastPrice);
    const ethPx=parseFloat(eth.lastPrice);
    document.getElementById('mbar').innerHTML=`
      <div class="mitem"><div class="mlbl">BTC</div><div class="mval ${btcChg>=0?'up':'down'}">$${btcPx.toLocaleString('en-US',{maximumFractionDigits:0})} <span style="font-size:11px">${btcChg>=0?'+':''}${btcChg.toFixed(2)}%</span></div></div>
      <div class="mitem"><div class="mlbl">ETH</div><div class="mval ${ethChg>=0?'up':'down'}">$${ethPx.toLocaleString('en-US',{maximumFractionDigits:0})} <span style="font-size:11px">${ethChg>=0?'+':''}${ethChg.toFixed(2)}%</span></div></div>
      <div class="mitem"><div class="mlbl">Mercado general</div><div class="mval ${btcChg>=0?'up':'down'}">${btcChg>=1.5?'Alcista':'btcChg<=-1.5'?'Bajista':'Neutral'}</div></div>
      <div style="margin-left:auto;font-size:11px;color:#333">BTC domina el mercado — si cae, las altcoins caen primero</div>`;
  }catch(e){document.getElementById('mbar').innerHTML='<span class="mbar-loading">No se pudo cargar mercado</span>';}
}

/* ---- MAIN ---- */
async function refreshAll(){
  if(!coins.length)return;
  await Promise.all(coins.map(c=>loadCoin(c)));
  document.getElementById('lu').textContent='Actualizado: '+new Date().toLocaleTimeString('es-PY')+' · '+document.getElementById('tf').value.toUpperCase();
  applyFilter();
  loadMarket();
}
function addCoin(){
  const inp=document.getElementById('ci');
  const c=inp.value.trim().toUpperCase().replace(/USDT$/,'');
  if(!c)return;
  inp.value='';
  quickAdd(c);
}
function quickAdd(c){
  if(coins.includes(c))return;
  coins.push(c);
  loadCoin(c);
}
function removeCoin(coin){
  coins=coins.filter(x=>x!==coin);
  delete cdata[coin];delete alerts[coin];delete history_[coin];
  const el=document.getElementById('c-'+coin);
  if(el)el.remove();
  if(!coins.length){
    const g=document.getElementById('grid');
    const em=document.createElement('div');em.id='empty-msg';em.className='empty';
    em.textContent='Agrega una moneda para comenzar';g.appendChild(em);
    document.getElementById('lu').textContent='';
  }
}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.getElementById('ci').addEventListener('keydown',e=>{if(e.key==='Enter')addCoin();});
loadMarket();
</script>
